<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ日記 - ノート風</title>
    <style>
        body {
            background-color: #f0eada; /* 紙のような少し黄色みがかった色 */
            /* フォントを柔らかいゴシック体に変更 */
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            margin: 0;
            color: #333;
        }

        .notebook {
            background-color: #fff;
            width: 100%;
            max-width: 600px;
            min-height: 800px;
            padding: 60px 40px 40px 70px;
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            /* 罫線（横線）を作る */
            background-image: linear-gradient(#eee .1em, transparent .1em);
            background-size: 100% 1.5em;
            line-height: 1.5em;
        }

        /* 左側の赤い垂直線 */
        .notebook::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50px;
            width: 2px;
            height: 100%;
            background-color: #ff8585;
            border-left: 1px solid #ff8585;
        }

        h1 {
            font-size: 1.8em;
            color: #555;
            text-align: center;
            margin-top: 0;
            margin-bottom: 2em;
        }

        .diary-entry {
            margin-bottom: 3em;
            position: relative;
            z-index: 1;
        }

        .date {
            font-weight: bold;
            color: #d9534f;
            display: block;
            margin-bottom: 0.5em;
        }

        h2 {
            font-size: 1.2em;
            margin: 0.5em 0;
        }

        p {
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="notebook">
        <h1>✾マイ日記✾</h1>

        <div class="diary-entry">
            <span class="date">2026.03.22</span>
            <h2>GitHub Pagesを更新中</h2>
            <p>
                英語のメニューに苦戦しながらも、少しずつサイトが変わっていくのが面白い。<br>
                インフラエンジニアへの第一歩として、まずはこの「自分の城」を整えてみよう。
            </p>
        </div>

        <div class="diary-entry">
            <span class="date">2026.03.23</span>
            <h2>今日の積み上げ</h2>
            <p>
                HTMLとCSSの基本を学んだ。VBAもそうだが、<br>
                自分が書いたコードで画面が変わる瞬間は、何度経験しても嬉しいものだ。
            </p>
        </div>
        <div class="diary-entry">
    <span class="date">2026.03.22</span>
    <h2>今日の積み上げ</h2>
    <p>
        むずかしい～けどGeminiに聞きながらやってみる。いつか趣味の編み物に関するサイトを立ち上げたい。
    </p>
</div>
    </div>

</body>
</html>
